name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/yongyou-bi-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/yongyou-bi-web
  DEPLOY_PATH: /opt/yongyou-bi

jobs:
  deploy:
    if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_PRIVATE_KEY != '' && env.GHCR_PULL_TOKEN != '' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: backend
          push: true
          tags: ${{ env.API_IMAGE }}:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: frontend
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ github.sha }}
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ env.DEPLOY_SSH_PRIVATE_KEY }}
      - name: Deploy immutable images
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          printf '%s' "$GHCR_PULL_TOKEN" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker login $REGISTRY -u '${{ github.actor }}' --password-stdin"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd $DEPLOY_PATH && API_IMAGE=$API_IMAGE:${{ github.sha }} WEB_IMAGE=$WEB_IMAGE:${{ github.sha }} docker compose -f compose.production.yml pull api web && API_IMAGE=$API_IMAGE:${{ github.sha }} WEB_IMAGE=$WEB_IMAGE:${{ github.sha }} docker compose -f compose.production.yml up -d --no-build postgres api web && curl --fail --retry 10 --retry-connrefused http://127.0.0.1/health"
