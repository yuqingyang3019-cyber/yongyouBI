name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: python -m unittest tests.test_auth_session tests.test_collection_sync_service tests.test_notification_tasks tests.test_overdue_service tests.test_postgres_receivable_store tests.test_receivable_match tests.test_receivable_notify tests.test_sqlbot_embed tests.test_yonyou_finance tests.test_yonyou_sales
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
